<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Hub</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. Core Base */
        body {
            background-color: #050505;
            overflow-x: hidden; /* Keeps particles from causing horizontal scroll */
        }

        /* 2. Glassmorphism Utilities (Bootstrap doesn't do "glass" out of the box) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 191, 166, 0.2);
            border-color: rgba(0, 191, 166, 0.5);
        }

        /* 3. Custom Visual Tweaks */
        .avatar-gradient { background: linear-gradient(135deg, #6C5CE7, #00BFA6); }
        .custom-title { letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* 4. Pure CSS Particles (Unchanged) */
        .particle-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.4); border-radius: 50%; animation: float linear infinite; bottom: -10px; }
        .p1 { left: 10%; width: 4px; height: 4px; animation-duration: 8s; animation-delay: 0s; }
        .p2 { left: 25%; width: 6px; height: 6px; animation-duration: 12s; animation-delay: 2s; }
        .p3 { left: 45%; width: 3px; height: 3px; animation-duration: 10s; animation-delay: 4s; }
        .p4 { left: 65%; width: 5px; height: 5px; animation-duration: 14s; animation-delay: 1s; }
        .p5 { left: 85%; width: 7px; height: 7px; animation-duration: 9s; animation-delay: 5s; }
        .p6 { left: 95%; width: 4px; height: 4px; animation-duration: 11s; animation-delay: 3s; }
        @keyframes float { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-120vh); opacity: 0; } }
    </style>
</head>
<body class="text-white min-vh-100">

    <div class="particle-container">
        <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div>
        <div class="particle p4"></div><div class="particle p5"></div><div class="particle p6"></div>
    </div>

    <div class="position-fixed top-0 start-0 m-3 p-2 rounded-4 shadow d-flex align-items-center gap-3 glass-panel" style="z-index: 1000; min-width: 200px;">
        <div class="rounded-circle overflow-hidden d-flex justify-content-center align-items-center flex-shrink-0 avatar-gradient" style="width: 65px; height: 65px;">
            <img src="./Image/IMG_20260222_005742.png" alt="Ashutosh Dash" class="w-100 h-100 object-fit-cover" onerror="this.style.display='none'">
        </div>
        <div class="d-flex flex-column">
            <span class="fw-bold" style="font-size: 15px;">Ashutosh Dash</span>
            <span class="text-white-50" style="font-size: 12px;">Software Engineer - Configurator Developer</span>
        </div>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 py-5">
        
        <h1 class="custom-title fw-bold mb-5 mt-4 text-center">Projects Hub</h1>

        <div class="row g-4 w-100" style="max-width: 900px;">
            
            <div class="col-12 col-md-6">
                <a href="https://project-1-eosin-three.vercel.app/" class="text-decoration-none text-white d-block h-100">
                    <div class="card bg-transparent glass-panel glass-card h-100 rounded-4 overflow-hidden">
                        <div class="ratio ratio-16x9">
                            <img src="./Image/project1.png" class="object-fit-cover w-100 h-100" alt="Project 1">
                        </div>
                        <div class="card-body text-center py-3">
                            <h5 class="text-secondary card-title fw-bold m-0">Project One</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-12 col-md-6">
                <a href="https://project-2-nine-beryl.vercel.app/" class="text-decoration-none text-white d-block h-100">
                    <div class="card bg-transparent glass-panel glass-card h-100 rounded-4 overflow-hidden">
                        <div class="ratio ratio-16x9">
                            <img src="./Image/project2.png" class="object-fit-cover w-100 h-100" alt="Project 2">
                        </div>
                        <div class="card-body text-center py-3">
                            <h5 class="text-secondary card-title fw-bold m-0">Project Two</h5>
                        </div>
                    </div>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
